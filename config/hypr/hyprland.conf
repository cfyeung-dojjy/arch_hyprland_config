# source = ~/.config/hypr/myColors.conf

# hyprland version: 0.54

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-3    ,preferred,auto-left,1
monitor=HDMI-A-1,preferred,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyspr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
# $terminal = ghostty
$fileManager = dolphin
# $fileManager = nemo
# $menu = wofi --show drun
$menu = rofi
$launch-menu = $menu -show drun
$screenshotTool = flameshot

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# https://wiki.hypr.land/FAQ/#how-do-i-autostart-my-favorite-apps
# exec-once = udiskie # automounts usb storages, not what I am looking for
# To mount additional hard drives at startup, see https://wiki.cachyos.org/configuration/automount_with_fstab/
exec-once = hyprpm reload -n
exec-once = hyprpaper
exec-once = ashell
exec-once = fcitx5
exec-once = flameshot
exec-once = systemctl --user start hyprpolkitagent
# --enable-features=UseOzonePlatform --ozone-platform=wayland --enable-wayland-ime
exec-once = gtk-launch brave
exec-once = gtk-launch discord

exec-once = vdesk 2 # move to virtual workspace 2 and launch the following apps
exec-once = code ~/arch_hyprland_config
exec-once = kitty


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/


env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# https://fcitx-im.org/wiki/Using_Fcitx_5_on_Wayland#KDE_Plasma
# env = GTK_IM_MODULE,fcitx5
env = QT_IM_MODULE,fcitx5
env = SDL_IM_MODULE,fcitx5
env = XMODIFIERS,@im=fcitx

env = ELECTRON_OZONE_PLATFORM_HINT,auto
# env = XDG_CURRENT_DESKTOP,Hyprland

# Dolphin file explorer need this to associate file type with application
# env = XDG_MENU_PREFIX,plasma-
env = XDG_MENU_PREFIX,arch-

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 1

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # layout = dwindle
    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    middle_click_paste = false # Set to true to enable pasting selected text with middle click
}

# https://wiki.hypr.land/Configuring/Scrolling-Layout/#config
scrolling {
    fullscreen_on_one_column = true
    column_width = 1.0
    focus_fit_method = 0 # 0=center, 1=fit
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = true
# }

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
    force_zero_scaling = true
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Activate rofi for application search
# bind = $mainMod, exec, $menu

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
# bind = $mainMod, SUPER_L, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# grouping
bind = $mainMod, G, togglegroup,
bind = ALT, Tab, changegroupactive, f
bind = $mainMod ALT, left, moveintogroup, l
bind = $mainMod ALT, right, moveintogroup, r
bind = $mainMod ALT, up, moveintogroup, u
bind = $mainMod ALT, down, moveintogroup, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, vdesk, 1
bind = $mainMod, 2, vdesk, 2
bind = $mainMod, 3, vdesk, 3
bind = $mainMod, 4, vdesk, 4
bind = $mainMod, 5, vdesk, 5
bind = $mainMod, 6, vdesk, 6
bind = $mainMod, 7, vdesk, 7
bind = $mainMod, 8, vdesk, 8
bind = $mainMod, 9, vdesk, 9
bind = $mainMod, 0, vdesk, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetodesk, 1
bind = $mainMod SHIFT, 2, movetodesk, 2
bind = $mainMod SHIFT, 3, movetodesk, 3
bind = $mainMod SHIFT, 4, movetodesk, 4
bind = $mainMod SHIFT, 5, movetodesk, 5
bind = $mainMod SHIFT, 6, movetodesk, 6
bind = $mainMod SHIFT, 7, movetodesk, 7
bind = $mainMod SHIFT, 8, movetodesk, 8
bind = $mainMod SHIFT, 9, movetodesk, 9
bind = $mainMod SHIFT, 0, movetodesk, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# open flameshot with mainMod + shift + S
bind = $mainMod SHIFT, S, exec, XDG_CURRENT_DESKTOP=sway flameshot gui
# bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

#! doesn't work well with virtual desktop
# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e-1
# bind = $mainMod, mouse_up, workspace, e+1

# Fullscreen
bind = $mainMod, F, fullscreen

# other window sizes, scrolling layout specific
bind = $mainMod SHIFT, F, layoutmsg, colresize 1.0
bind = $mainMod SHIFT, comma, layoutmsg, colresize -0.1
bind = $mainMod SHIFT, period, layoutmsg, colresize +0.1

bind = $mainMod, bracketleft, layoutmsg, swapcol l
bind = $mainMod, bracketright, layoutmsg, swapcol r

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
# were not bind to multimedia keys
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous
# bind = , Pause, exec, playerctl play-pause

bindr = $mainMod, SUPER_L, exec, pkill $menu || $launch-menu

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
windowrule {
    name = float-file-manager
    match:class = .*dolphin$
    float = true
    size = (monitor_w*0.8) (monitor_h*0.8)
}
windowrule { # does nothing at the moment
    name = float-file-manager-from-browser
    match:class = xdg-desktop-portal-gtk
    float = true
    size = (monitor_w*0.8) (monitor_h*0.8)
}
windowrule {
    name = float-network-manager
    match:title = iwgtk
    float = true
    size = (monitor_w*0.5) (monitor_h*0.5)
}

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = suppress-fullscreen-events
    match:class = .*
    suppress_event = fullscreen
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = true
}

# https://wiki.hypr.land/FAQ/#how-do-i-screenshot
windowrule {
    name = flameshot-tweaks
    match:class = flameshot
    match:title = flameshot # so that Configuration widget will still be i monitor long
    rounding = 0
    border_size = 0
    fullscreen_state = 0 0
    float = on
    monitor = DP-3
    move = 0 0
    size = (monitor_w*2) (monitor_h)

    pin = true
    no_initial_focus = true
    no_anim = true
}


plugin {
    virtual-desktops {
        # https://github.com/levnikmyskin/hyprland-virtual-desktops
        cycleworkspaces = 1
        rememberlayout = size
        notifyinit = 1
        verbose_logging = 0
    }
}